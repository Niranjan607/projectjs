<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Store App</title>

<style>
body{
    font-family:Arial,sans-serif;
    padding:20px;
}

.controls{
    margin-bottom:20px;
}

button{
    padding:8px 12px;
    margin:5px;
    cursor:pointer;
}

#products{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
}

.card{
    width:220px;
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

.card img{
    width:150px;
    height:150px;
    object-fit:contain;
    cursor:pointer;
}

#modal{
    display:none;
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.6);
}

#modal-body{
    background:white;
    width:400px;
    margin:80px auto;
    padding:20px;
}

#cart{
    margin-top:30px;
    border-top:2px solid black;
    padding-top:20px;
}
</style>

</head>

<body>

<div class="controls">

<input type="text" id="search" placeholder="Search Product">

<br><br>

<button class="category-btn" data-category="all">All</button>
<button class="category-btn" data-category="men's clothing">Men's Clothing</button>
<button class="category-btn" data-category="women's clothing">Women's Clothing</button>
<button class="category-btn" data-category="jewelery">Jewelery</button>
<button class="category-btn" data-category="electronics">Electronics</button>

<br><br>

<button id="lowHigh">Low → High</button>
<button id="highLow">High → Low</button>

</div>

<div id="products"></div>

<div id="modal">
    <div id="modal-body"></div>
</div>

<div id="cart">

<h2>Cart (<span id="cart-count">0</span>)</h2>

<div id="cart-items"></div>

<h3>Grand Total : <span id="grand-total">$0.00</span></h3>

</div>

<script>

const API="https://fakestoreapi.com/products";

let products=[];
let filteredProducts=[];
let cart=[];

const productContainer=document.getElementById("products");
const searchInput=document.getElementById("search");

const modal=document.getElementById("modal");
const modalBody=document.getElementById("modal-body");

const cartCount=document.getElementById("cart-count");
const cartItems=document.getElementById("cart-items");
const grandTotal=document.getElementById("grand-total");

async function getProducts(){

const res=await fetch(API);
products=await res.json();
filteredProducts=[...products];
displayProducts(filteredProducts);

}

getProducts();

function displayProducts(data){

productContainer.innerHTML="";

if(data.length===0){
productContainer.innerHTML="<h2>No Products Found</h2>";
return;
}

data.forEach(product=>{

productContainer.innerHTML+=`

<div class="card">

<img src="${product.image}" class="product-image" data-id="${product.id}">

<h4>${product.title}</h4>

<p>$${product.price}</p>

<button class="cart-btn" data-id="${product.id}">
Add To Cart
</button>

</div>

`;

});

}

searchInput.addEventListener("input",function(){

let value=this.value.toLowerCase();

filteredProducts=products.filter(product=>

product.title.toLowerCase().includes(value)

);

displayProducts(filteredProducts);

});

document.querySelectorAll(".category-btn").forEach(btn=>{

btn.addEventListener("click",()=>{

let category=btn.dataset.category;

if(category==="all"){

filteredProducts=[...products];

}else{

filteredProducts=products.filter(product=>

product.category===category

);

}

displayProducts(filteredProducts);

});

});

document.getElementById("lowHigh").addEventListener("click",()=>{

filteredProducts=[...filteredProducts].sort((a,b)=>a.price-b.price);

displayProducts(filteredProducts);

});

document.getElementById("highLow").addEventListener("click",()=>{

filteredProducts=[...filteredProducts].sort((a,b)=>b.price-a.price);

displayProducts(filteredProducts);

});

productContainer.addEventListener("click",(e)=>{

if(e.target.classList.contains("product-image")){

const id=Number(e.target.dataset.id);

const product=products.find(item=>item.id===id);

modal.style.display="block";

modalBody.innerHTML=`

<img src="${product.image}" width="200">

<h2>${product.title}</h2>

<p>${product.description}</p>

<h3>Price : $${product.price}</h3>

<h3>Category : ${product.category}</h3>

<h3>Rating : ${product.rating.rate}</h3>

`;

}

if(e.target.classList.contains("cart-btn")){

const id=Number(e.target.dataset.id);

const product=products.find(item=>item.id===id);

const existing=cart.find(item=>item.id===id);

if(existing){

existing.quantity++;

}else{

cart.push({...product,quantity:1});

}

updateCart();

}

});

window.onclick=function(e){

if(e.target===modal){

modal.style.display="none";

}

}

function updateCart(){

cartCount.textContent=cart.reduce((sum,item)=>sum+item.quantity,0);

cartItems.innerHTML="";

cart.forEach(item=>{

cartItems.innerHTML+=`

<p>
<strong>${item.title}</strong><br>

Quantity : ${item.quantity}<br>

Total : $${(item.quantity*item.price).toFixed(2)}

</p>

<hr>

`;

});

const total=cart.reduce((sum,item)=>sum+item.quantity*item.price,0);

grandTotal.textContent="$"+total.toFixed(2);

}

</script>

</body>
</html>
