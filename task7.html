// Movie List
let movies = ["Leo", "Jailer", "Master", "Vikram"];

console.log("Original Movies:", movies);

// Add new movies
movies.push("Kaithi");
movies.push("Beast");
console.log("After Push:", movies);

// Remove last movie
movies.pop();
console.log("After Pop:", movies);

// Remove first movie
movies.shift();
console.log("After Shift:", movies);

// Add featured movie at beginning
movies.unshift("Thug Life");
console.log("After Unshift:", movies);

// Replace one movie
movies.splice(2, 1, "Coolie");
console.log("After Splice:", movies);

// Movie ratings
let ratings = [4.5, 3.8, 4.9, 4.2, 5.0];

ratings.sort((a, b) => b - a);
console.log("Ratings (Descending):", ratings);

console.log("Contains Leo?", movies.includes("Leo"));
