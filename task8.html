<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Functions Assignment</title>
</head>
<body>
    <script>// Task 1
let dob = new Date("2002-07-15");
let today = new Date();
let age = today.getFullYear() - dob.getFullYear();
if (today.getMonth() < dob.getMonth() || (today.getMonth() == dob.getMonth() && today.getDate() < dob.getDate())) age--;
console.log("Employee Age:", age, "Years");

// Task 2
let appointment = new Date();
appointment.setFullYear(2027);
appointment.setMonth(11);
appointment.setDate(15);
appointment.setHours(10);
appointment.setMinutes(30);
appointment.setSeconds(0);
console.log("Updated Appointment:", appointment);

// Task 3
let current = new Date();
console.log("India:", current.toLocaleString("en-IN", { timeZone: "Asia/Kolkata" }));
console.log("New York:", current.toLocaleString("en-US", { timeZone: "America/New_York" }));
console.log("Tokyo:", current.toLocaleString("en-JP", { timeZone: "Asia/Tokyo" }));

// Task 4
let purchaseDate = new Date();
let warrantyExpiry = new Date(purchaseDate);
warrantyExpiry.setFullYear(warrantyExpiry.getFullYear() + 2);
console.log("Purchase Date:", purchaseDate.toDateString());
console.log("Warranty Expiry:", warrantyExpiry.toDateString());

// Task 5
setInterval(function () {
    console.log(new Date().toLocaleTimeString());
}, 1000);

</script>

</body>
</html>
