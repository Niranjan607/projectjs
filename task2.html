    Rahul: "Present",
    Arun: "Absent",
    Kamal: "Present",
    Priya: "Present",

};

let absentCount = 0;

// Print lists
console.log("Present Employees:");
console.log("-------------------");

for (let name in employees) {
    if (employees[name] === "Present") {
        console.log(name);
        presentCount++;
    }
}

console.log("\nAbsent Employees:");
console.log("------------------");

    if (employees[name] === "Absent") {
        console.log(name);
        absentCount++;
    }
}

console.log("Total Absent: " + absentCount);
